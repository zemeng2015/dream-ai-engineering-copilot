# SPDX-License-Identifier: Apache-2.0

edition: 3.0.0
name: dream-qwencloud-memoryagent
access: default

vars:
  region: ${env(ALIBABA_CLOUD_REGION, "ap-southeast-1")}
  serviceName: dream-qwencloud-memoryagent
  functionName: dream-api

resources:
  dreamApi:
    component: fc3
    props:
      region: ${vars.region}
      functionName: ${vars.functionName}
      description: DREAM Track 1 MemoryAgent API backed by Qwen Cloud.
      runtime: custom-container
      timeout: 120
      memorySize: 2048
      cpu: 1
      diskSize: 1024
      internetAccess: true
      instanceConcurrency: 4
      customContainerConfig:
        image: ${env(ALIBABA_CLOUD_CONTAINER_IMAGE)}
        port: 8000
      environmentVariables:
        DREAM_CONFIG_FILE: /app/examples/config/dream.qwen.yaml
        DREAM_ARTIFACT_ROOT: /tmp/dream-artifacts
        DREAM_AUDIT_DB_PATH: /tmp/dream.sqlite
        DASHSCOPE_API_KEY: ${env(DASHSCOPE_API_KEY)}
        QWEN_BASE_URL: ${env(QWEN_BASE_URL)}
        QWEN_MODEL: ${env(QWEN_MODEL, "qwen3.7-plus")}
        QWEN_MAX_PROMPT_CHARS: "24000"
        DREAM_PUBLIC_QWEN_REQUESTS_PER_MINUTE: "6"
        ALIBABA_CLOUD_REGION: ${vars.region}
        ALIBABA_CLOUD_SERVICE: Function Compute custom container
      triggers:
        - triggerName: dream-http
          triggerType: http
          qualifier: LATEST
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
              - PUT
              - PATCH
              - OPTIONS
