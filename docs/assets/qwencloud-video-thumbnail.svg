    </filter>
    <style>
      .sans { font-family: Inter, Segoe UI, Arial, sans-serif; letter-spacing: 0; }
      .mono { font-family: Consolas, SFMono-Regular, Menlo, monospace; letter-spacing: 0; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="#082f3f"/>
  <rect x="0" y="0" width="1280" height="10" fill="#f6c85f"/>
