    <text class="sans" x="0" y="50" fill="#dceef3" font-size="25" font-weight="700">Remember durable experience. Replace stale guidance.</text>
    <text class="sans" x="0" y="90" fill="#dceef3" font-size="25" font-weight="700">Recall only the current truth under a hard context budget.</text>
