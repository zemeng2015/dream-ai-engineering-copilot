# SPDX-License-Identifier: Apache-2.0

name: Qwen Cloud Release

on:
  workflow_dispatch:
    inputs:
      demoVideoUrl:
        description: Public YouTube, Vimeo, or Youku URL
        required: true
        type: string
      backendUrl:
        description: Existing Alibaba backend URL. Leave empty to deploy and auto-detect when possible.
        required: false
        type: string
      blogPostUrl:
        description: Optional public blog or social journey URL
        required: false
        type: string
      imageTag:
        description: Local Docker tag used before pushing to Alibaba Container Registry
        required: false
        default: dream-qwencloud-memoryagent:ci
        type: string
      skipPush:
        description: Skip docker tag/push. Use only when ALIBABA_CLOUD_CONTAINER_IMAGE already exists.
        required: false
        default: false
        type: boolean
      skipDeploy:
        description: Skip Serverless Devs deploy. Requires backendUrl.
        required: false
        default: false
        type: boolean
      skipDraft:
        description: Skip live requirements/draft proof calls.
        required: false
        default: false
        type: boolean
      allowDraftPacket:
        description: Allow packet generation to finish as DRAFT for diagnostics.
        required: false
        default: false
        type: boolean

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
      ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
      ALIBABA_CLOUD_ACCOUNT_ID: ${{ secrets.ALIBABA_CLOUD_ACCOUNT_ID }}
      ALIBABA_CLOUD_REGION: ${{ secrets.ALIBABA_CLOUD_REGION }}
      ALIBABA_CLOUD_CONTAINER_IMAGE: ${{ secrets.ALIBABA_CLOUD_CONTAINER_IMAGE }}
      ALIBABA_CONTAINER_REGISTRY_USERNAME: ${{ secrets.ALIBABA_CONTAINER_REGISTRY_USERNAME }}
      ALIBABA_CONTAINER_REGISTRY_PASSWORD: ${{ secrets.ALIBABA_CONTAINER_REGISTRY_PASSWORD }}
      DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
      QWEN_BASE_URL: ${{ secrets.QWEN_BASE_URL }}
      QWEN_MODEL: ${{ secrets.QWEN_MODEL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install app
        run: pip install -e ".[dev]"

      - name: Install Serverless Devs
        run: npm install -g @serverless-devs/s

      - name: Validate release inputs and secrets
        shell: pwsh
        run: |
          $missing = @()
          foreach ($name in @(
            "ALIBABA_CLOUD_ACCESS_KEY_ID",
            "ALIBABA_CLOUD_ACCESS_KEY_SECRET",
            "ALIBABA_CLOUD_REGION",
            "ALIBABA_CLOUD_CONTAINER_IMAGE",
            "DASHSCOPE_API_KEY"
          )) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              $missing += $name
            }
          }

          if ("${{ inputs.skipPush }}" -ne "true") {
            foreach ($name in @(
              "ALIBABA_CONTAINER_REGISTRY_USERNAME",
              "ALIBABA_CONTAINER_REGISTRY_PASSWORD"
            )) {
              if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
                $missing += $name
              }
            }
          }

          if ("${{ inputs.skipDeploy }}" -eq "true" -and [string]::IsNullOrWhiteSpace("${{ inputs.backendUrl }}")) {
            $missing += "backendUrl input when skipDeploy=true"
          }

          if ($missing.Count -gt 0) {
            throw "Missing required release inputs/secrets: $($missing -join ', ')"
          }

      - name: Validate public demo video URL
        shell: pwsh
        run: ./scripts/qwencloud-video-upload-status.ps1 -DemoVideoUrl "${{ inputs.demoVideoUrl }}" -SkipLocalVideoChecks

      - name: Configure Serverless Devs access
        shell: pwsh
        run: |
          $args = @(
            "config", "add",
            "--AccessKeyID", $env:ALIBABA_CLOUD_ACCESS_KEY_ID,
            "--AccessKeySecret", $env:ALIBABA_CLOUD_ACCESS_KEY_SECRET,
            "-a", "default",
            "-f"
          )
          if (-not [string]::IsNullOrWhiteSpace($env:ALIBABA_CLOUD_ACCOUNT_ID)) {
            $args += @("--AccountID", $env:ALIBABA_CLOUD_ACCOUNT_ID)
          }
          & s @args
          "Serverless Devs default access configured."

      - name: Log in to Alibaba Container Registry
        if: ${{ inputs.skipPush != true }}
        shell: pwsh
        run: |
          $registryHost = ($env:ALIBABA_CLOUD_CONTAINER_IMAGE -split "/")[0]
          if ([string]::IsNullOrWhiteSpace($registryHost) -or $registryHost -eq $env:ALIBABA_CLOUD_CONTAINER_IMAGE) {
            throw "ALIBABA_CLOUD_CONTAINER_IMAGE must include a registry host, for example registry-intl.ap-southeast-1.aliyuncs.com/namespace/repo:tag"
          }
          $env:ALIBABA_CONTAINER_REGISTRY_PASSWORD | docker login $registryHost -u $env:ALIBABA_CONTAINER_REGISTRY_USERNAME --password-stdin

      - name: Run Alibaba release flow
        shell: pwsh
        run: |
          $args = @(
            "-DemoVideoUrl", "${{ inputs.demoVideoUrl }}",
            "-ImageTag", "${{ inputs.imageTag }}"
          )
          if (-not [string]::IsNullOrWhiteSpace("${{ inputs.backendUrl }}")) {
            $args += @("-BackendUrl", "${{ inputs.backendUrl }}")
          }
          if (-not [string]::IsNullOrWhiteSpace("${{ inputs.blogPostUrl }}")) {
            $args += @("-BlogPostUrl", "${{ inputs.blogPostUrl }}")
          }
          if ("${{ inputs.skipPush }}" -eq "true") { $args += "-SkipPush" }
          if ("${{ inputs.skipDeploy }}" -eq "true") { $args += "-SkipDeploy" }
          if ("${{ inputs.skipDraft }}" -eq "true") { $args += "-SkipDraft" }
          if ("${{ inputs.allowDraftPacket }}" -eq "true") { $args += "-AllowDraftPacket" }
          ./scripts/qwencloud-alibaba-release.ps1 @args

      - name: Generate final readiness and upload bundle
        if: always()
        shell: pwsh
        run: |
          $common = @("-DemoVideoUrl", "${{ inputs.demoVideoUrl }}")
          $backendUrl = "${{ inputs.backendUrl }}"
          if ([string]::IsNullOrWhiteSpace($backendUrl)) {
            $releaseJson = Get-ChildItem -LiteralPath "artifacts/qwencloud-proof" -Filter "alibaba-release-*.json" -ErrorAction SilentlyContinue |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 1
            if ($releaseJson) {
              $release = Get-Content -LiteralPath $releaseJson.FullName -Raw | ConvertFrom-Json
              $backendUrl = [string]$release.backendUrl
            }
          }
          if (-not [string]::IsNullOrWhiteSpace($backendUrl)) {
            $common += @("-BackendUrl", $backendUrl)
          }
          if (-not [string]::IsNullOrWhiteSpace("${{ inputs.blogPostUrl }}")) {
            $common += @("-BlogPostUrl", "${{ inputs.blogPostUrl }}")
          }
          & pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/qwencloud-final-readiness.ps1 @common -SkipLocalVideoChecks -AllowDraftPacket
          $readinessCode = $LASTEXITCODE
          & pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/qwencloud-final-action-board.ps1 @common -SkipGitHubSecrets -SkipLocalVideoChecks -AllowDraft
          $actionBoardCode = $LASTEXITCODE
          & pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/qwencloud-final-upload-bundle.ps1 @common -AllowDraft
          $bundleCode = $LASTEXITCODE
          if ($readinessCode -ne 0 -or $actionBoardCode -ne 0 -or $bundleCode -ne 0) {
            throw "Final readiness/action board/upload bundle remained DRAFT. readiness=$readinessCode actionBoard=$actionBoardCode bundle=$bundleCode"
          }

      - name: Upload release artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qwencloud-release-proof
          path: artifacts/qwencloud-proof/
