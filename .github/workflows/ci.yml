# SPDX-License-Identifier: Apache-2.0

name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest
      - name: Local Qwen proof runner
        shell: pwsh
        run: ./scripts/qwencloud-run-local-proof.ps1 -SkipDraft
      - name: Bash local Qwen proof runner
        run: bash scripts/qwencloud-run-local-proof.sh --skip-draft --allow-dirty --port 8013
      - name: Upload hackathon proof artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qwencloud-proof
          path: artifacts/qwencloud-proof/

