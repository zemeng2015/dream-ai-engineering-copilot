# SPDX-License-Identifier: Apache-2.0

name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest
      - name: Start Qwen mode API
        env:
          DREAM_CONFIG_FILE: examples/config/dream.qwen.yaml
          QWEN_BASE_URL: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
          QWEN_MODEL: qwen3.7-plus
        run: |
          mkdir -p artifacts/qwencloud-proof
          python -m uvicorn dream.api.app:app --host 127.0.0.1 --port 8000 > artifacts/qwencloud-proof/ci-api.log 2>&1 &
          echo $! > artifacts/qwencloud-proof/ci-api.pid
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/health; then
              exit 0
            fi
            sleep 1
          done
          cat artifacts/qwencloud-proof/ci-api.log
          exit 1
      - name: Hackathon audit
        shell: pwsh
        run: ./scripts/qwencloud-hackathon-audit.ps1 -BaseUrl http://127.0.0.1:8000 -SkipDraft
      - name: Stop Qwen mode API
        if: always()
        run: |
          if [ -f artifacts/qwencloud-proof/ci-api.pid ]; then
            kill "$(cat artifacts/qwencloud-proof/ci-api.pid)" || true
          fi
      - name: Upload hackathon proof artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qwencloud-proof
          path: artifacts/qwencloud-proof/

