name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest
      - name: Local Qwen proof runner
        shell: pwsh
        run: ./scripts/qwencloud-run-local-proof.ps1 -SkipDraft
      - name: Bash local Qwen proof runner
        run: bash scripts/qwencloud-run-local-proof.sh --skip-draft --allow-dirty --port 8013
      - name: Upload hackathon proof artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qwencloud-proof
          path: artifacts/qwencloud-proof/

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24.14.1"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install locked frontend dependencies
        run: npm ci
      - name: Audit production dependencies
        run: npm audit --omit=dev
      - name: Audit full frontend dependency tree
        run: npm audit
      - name: Build Angular production bundle
        run: npm run build
      - name: Test Angular in ChromeHeadless
        run: npm test -- --watch=false --browsers=ChromeHeadless

