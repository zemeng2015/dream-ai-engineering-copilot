<section class="memory-summary" aria-label="Codebase index summary">
  <article class="summary-card tone-info">
    <span>Indexed Files</span>
    <strong>{{ indexedFiles }}</strong>
    <small>{{ sourceFiles }} source files</small>
  </article>
  <article class="summary-card tone-success">
    <span>Tests</span>
    <strong>{{ testFiles }}</strong>
    <small>linked by the repo index</small>
  </article>
  <article class="summary-card tone-neutral">
    <span>Symbols</span>
    <strong>{{ symbols }}</strong>
    <small>classes, functions, or modules</small>
  </article>
  <article class="summary-card tone-warning">
    <span>Concepts</span>
    <strong>{{ concepts }}</strong>
    <small>repository relationships</small>
  </article>
</section>
