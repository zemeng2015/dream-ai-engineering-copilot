<section class="page code-memory-page">
  <header class="page-header command-header">
    <div>
      <span class="eyebrow">Live codebase memory</span>
      <h1>Repo Browser & Index JSON</h1>
      <p>Browse actual repo files and inspect the selected JSON index record used by memory and eval workflows.</p>
    </div>
    <div class="index-beacon">
      <span></span>
      <strong>{{ form.controls.repoName.value }}</strong>
      <small>{{ indexSummary()?.indexedAt || 'loaded from FastAPI' }}</small>
    </div>
  </header>

  @if (apiError(); as message) {
    <div class="warning-callout">{{ message }}</div>
  }

  <app-codebase-index-controls
    [form]="form"
    [isLoading]="isLoading()"
    [isIndexing]="isIndexing()"
    (searchRequested)="runSearch()"
    (indexRequested)="refreshIndex()"
  />

  <app-codebase-summary-cards
    [indexedFiles]="files().length"
    [sourceFiles]="sourceFileCount()"
    [testFiles]="testFileCount()"
    [symbols]="symbolCount()"
    [concepts]="concepts().length"
  />

  <section class="repo-workspace" aria-label="Repository browser and index JSON">
    <app-repo-browser-panel
      [repoPath]="form.controls.repoPath.value"
      [breadcrumbs]="repoBreadcrumbs()"
      [folders]="currentFolderEntries()"
      [files]="currentFolderFiles()"
      [selectedFilePath]="selectedFilePath()"
      [currentFolderPath]="currentFolderPath()"
      (folderSelected)="navigateFolder($event)"
      (fileSelected)="selectFile($event)"
    />

    <app-code-preview-panel
      [selectedFile]="selectedFile()"
      [codeLines]="codeLines()"
      [isFileLoading]="isFileLoading()"
    />

    <app-index-json-panel
      [repoIndexPath]="repoIndexPath()"
      [selectedFileJson]="selectedFileJson()"
    />
  </section>

  <section class="support-layout" aria-label="Search evidence and impact map">
    <app-evidence-search-panel
      [results]="results()"
      (sourceSelected)="selectPath($event)"
    />

    <app-impact-map-panel
      [concepts]="selectedImpactConcepts().length ? selectedImpactConcepts() : topConcepts()"
      (sourceSelected)="selectPath($event)"
    />
  </section>
</section>
