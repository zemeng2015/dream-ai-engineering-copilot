<section class="workspace-page reveal-page">
  <header class="workspace-header">
    <div>
      <h1>Memory Hub</h1>
      <p>Review sources before they become memory.</p>
    </div>
  </header>

  <nav class="workspace-tabs" aria-label="Memory Hub sections">
    @for (tab of tabs; track tab.id) {
      <button
        type="button"
        [class.active]="activeTab() === tab.id"
        (click)="selectTab(tab.id)"
      >
        <strong>{{ tab.label }}</strong>
      </button>
    }
  </nav>

  <div class="workspace-embedded">
    @switch (activeTab()) {
      @case ('sources') {
        <app-knowledge-intake />
      }
      @case ('packs') {
        <app-knowledge-base />
      }
      @case ('codebase') {
        <app-codebase-memory />
      }
      @case ('graph') {
        <app-evidence-graph />
      }
    }
  </div>
</section>
