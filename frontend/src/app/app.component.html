<div class="app-shell" [class.sidebar-collapsed]="sidebarCollapsed()">
  <aside class="sidebar" aria-label="Primary navigation">
    <div class="sidebar-head">
      <a class="brand" routerLink="/mission-control" aria-label="DREAM mission control">
        <span class="brand-mark">D</span>
        <span class="brand-text">
          <strong>DREAM</strong>
        </span>
      </a>
      <button
        class="sidebar-toggle"
        type="button"
        [attr.aria-label]="sidebarCollapsed() ? 'Expand sidebar' : 'Collapse sidebar'"
        [attr.aria-expanded]="!sidebarCollapsed()"
        (click)="toggleSidebar()"
      >
        <app-ui-icon [name]="sidebarCollapsed() ? 'chevron-right' : 'chevron-left'" />
      </button>
    </div>

    <nav class="nav-list">
      @for (item of navItems; track item.path) {
        <a
          class="nav-link"
          [routerLink]="item.path"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: item.path === '/mission-control' }"
        >
          <app-ui-icon [name]="item.icon" />
          <span class="nav-label">{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="sidebar-footer">
      <div class="mode-line">
        <span class="pulse-dot" aria-hidden="true"></span>
        <span>Qwen Cloud</span>
        <strong>Live Runtime</strong>
      </div>
      <div class="environment-line">
        <span>Environment</span>
        <strong>Alibaba Cloud</strong>
      </div>
      <div class="version-line">
        <strong>Angular + FastAPI</strong>
      </div>
    </div>
  </aside>

  <section class="workspace">
    <header class="topbar">
      <div class="topbar-title">
        <strong>DREAM</strong>
      </div>
      <div class="topbar-actions">
        <span class="mode-chip">
          <span class="pulse-dot" aria-hidden="true"></span>
          Live Backend
        </span>
        <a class="ghost-button" routerLink="/memory">Memory</a>
        <span class="avatar" aria-label="Signed in as Demo Engineer">DE</span>
      </div>
    </header>

    <main class="content" id="main-content">
      <router-outlet />
    </main>
  </section>
</div>
